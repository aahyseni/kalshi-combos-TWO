# PRODUCTION config. Quoting here additionally requires the --confirm-live CLI
# flag AND safety.prod_limits_configured: true (set only after the human has
# reviewed the limits). Until Phase 7 this stays false.
env: prod
mode: observe

logging:
  json_output: true
  level: INFO

safety:
  # Operator sign-off 2026-07-13: researched $2,000-start caps reviewed and
  # accepted (per_combo 1% ~$20, daily-soft 6% $120, drawdown 10% $200,
  # hard-trip KILL 12% $240; docs/research/CAP_recommendation_2000.md). This
  # flag + --confirm-live are the two loud gates that arm live quoting.
  prod_limits_configured: true

pricing:
  quote:
    # Fade defense: quote combos ONE-SIDED as a pure parlay seller. yes_bid is
    # forced to 0 so we can only ever be long NO (sell the parlay), never long
    # YES (accepting our yes_bid = the -14c/ct adversely-selected fade side).
    # See docs/reports/2026-07-08-combo-yes-no-side-mechanics.md.
    sell_parlays_only: true

# Pregame-only quote gate (Phase 3, operator directive 2026-07-10) is ACTIVE
# by default: combos with ANY in-play or unknown-start leg are declined, all
# sports. To re-enable in-play quoting later add under `filters:`:
#   allow_inplay_legs: true
# See rfq/pregame.py + docs/reports/2026-07-10-phase3-pregame-gate.md.
#
# Leg-series allowlist (operator directive 2026-07-11, judge finding F1) is
# ACTIVE by default in code: every leg must start with KXWC or KXMLB, else the
# RFQ declines skip_series_not_allowed. To UNBLOCK a new sport/competition add
# under `filters:` (after its classification + priors exist):
#   allowed_leg_series_prefixes: [KXWC, KXMLB, <NEWPREFIX>]
# Set to null to disable the gate entirely.

data_dir: data
kill_file: KILL
