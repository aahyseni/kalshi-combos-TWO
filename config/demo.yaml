# Demo environment config. Secrets come only from env vars:
#   KALSHI_API_KEY_ID, and KALSHI_PRIVATE_KEY_PATH or KALSHI_PRIVATE_KEY_PEM
env: demo
mode: observe

logging:
  json_output: true
  level: INFO

safety:
  prod_limits_configured: false

filters:
  # Sports combos only (mission scope). Prefixes match mve_collection_ticker.
  collection_whitelist:
    - KXMVESPORTS
    - KXMVECROSSCATEGORY
    - KXMVENBA
    - KXMVEMLB
    - KXMVENFL
    - KXMVENHL

data_dir: data
kill_file: KILL
