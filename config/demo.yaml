# Demo environment config. Secrets come only from env vars:
#   KALSHI_API_KEY_ID, and KALSHI_PRIVATE_KEY_PATH or KALSHI_PRIVATE_KEY_PEM
env: demo
mode: observe

logging:
  json_output: true
  level: INFO

safety:
  prod_limits_configured: false

pricing:
  quote:
    # Fade defense: quote combos ONE-SIDED as a pure parlay seller. yes_bid is
    # forced to 0 so we can only ever be long NO (sell the parlay), never long
    # YES (accepting our yes_bid = the -14c/ct adversely-selected fade side).
    # See docs/reports/2026-07-08-combo-yes-no-side-mechanics.md.
    sell_parlays_only: true

filters:
  # Leg-series allowlist (operator 2026-07-11, judge F1): every leg must
  # start with one of these prefixes or the RFQ declines. UNBLOCK a new
  # sport/competition by adding its prefix here once classification +
  # priors exist; set to null to disable. Default (code): [KXWC, KXMLB].
  # allowed_leg_series_prefixes: [KXWC, KXMLB]
  # Sports combos only (mission scope). Prefixes match mve_collection_ticker.
  collection_whitelist:
    - KXMVESPORTS
    - KXMVECROSSCATEGORY
    - KXMVENBA
    - KXMVEMLB
    - KXMVENFL
    - KXMVENHL
  # Pregame-only quote gate (Phase 3, operator directive 2026-07-10): combos
  # with ANY in-play or unknown-start leg are declined, all sports. The line
  # below is the ONLY switch needed to re-enable in-play quoting later.
  # See rfq/pregame.py + docs/reports/2026-07-10-phase3-pregame-gate.md.
  # allow_inplay_legs: true

data_dir: data
kill_file: KILL
